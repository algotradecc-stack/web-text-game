<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超時空傳說 3（Web）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>超時空傳說 3（Web）</h1>
      <p class="subtitle">在浏览器中体验职业、技能树与战斗的文字冒险。</p>
    </header>

    <main>
      <div class="game-grid">
        <section class="scene" id="scene">
          <figure class="scene-image" aria-label="Scene illustration">
            <img id="sceneImage" src="images/scene1.svg" alt="" />
          </figure>

          <article class="scene-text">
            <p id="sceneText"></p>
          </article>

          <div id="choices" class="choices"></div>
        </section>

        <aside class="sidebar" id="sidebar">
          <h2>状态面板</h2>
          <div id="status"></div>

          <h2>职业树</h2>
          <figure class="skilltree" aria-label="Skill tree">
            <img src="images/skilltree.svg" alt="Skill tree" />
          </figure>

          <div class="tip">
            <strong>提示：</strong>升级后可获得技能点，在营地学习新技能。
          </div>
        </aside>
      </div>

      <footer class="footer">
        <button id="restartBtn" class="btn" type="button">重新开始</button>
      </footer>
    </main>

    <script src="game.js"></script>
  </body>
</html>
